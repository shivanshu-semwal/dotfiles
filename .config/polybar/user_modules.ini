[module/apps]
type = custom/text

[module/term]
inherit = module/apps
content = 
content-foreground = ${color.blue-gray}
click-left = termite &
click-middle = urxvt &
click-right = xfce4-terminal &

[module/files]
inherit = module/apps
content = 
content-foreground = ${color.blue}
click-left = thunar &
click-right = pcmanfm &

[module/browser]
inherit = module/apps
content = 
content-foreground = ${color.orange}
click-left = firefox &
click-right = chromium &

[module/settings]
inherit = module/apps
content = 
content-foreground = ${color.teal}
click-left = xfce4-settings-manager &
click-right = lxappearance &

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/powermenu]
type = custom/menu

; If true, <label-toggle> will be to the left of the menu items (default).
; If false, it will be on the right of all the items.
expand-right = true

; "menu-LEVEL-N" has the same properties as "label-NAME" with
; the additional "exec" property
;
; Available exec commands:
;   menu-open-LEVEL
;   menu-close
; Other commands will be executed using "/usr/bin/env sh -c $COMMAND"
menu-0-0 = " Reboot |"
menu-0-0-exec = menu-open-1
menu-0-1 = " Shutdown "
menu-0-1-exec = menu-open-2

menu-1-0 = " Back |"
menu-1-0-exec = menu-open-0
menu-1-1 = " Reboot "
menu-1-1-exec = systemctl reboot

menu-2-0 = " Shutdown |"
menu-2-0-exec = systemctl poweroff
menu-2-1 = " Back "
menu-2-1-exec = menu-open-0

; Available tags:
;   <label-toggle> (default) - gets replaced with <label-(open|close)>
;   <menu> (default)
; Note that if you use <label-toggle> you must also include
; the definition for <label-open>

format = <label-toggle><menu>

label-open = 
label-open-foreground = ${color.cyan}
label-open-padding = 1
label-close =  
label-close-foreground = ${color.red}
label-close-padding = 1

; Optional item separator
; Default: none
;label-separator = " | "
;label-separator-foreground = ${color.foreground}
;label-separator-background = ${color.background-alt}

;;label-open-foreground = ${color.foreground}
;;label-close-foreground = ${color.background}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/menu]
type = custom/menu

; If true, <label-toggle> will be to the left of the menu items (default).
; If false, it will be on the right of all the items.
expand-right = true

; "menu-LEVEL-N" has the same properties as "label-NAME" with
; the additional "exec" property
;
; Available exec commands:
;   menu-open-LEVEL
;   menu-close
; Other commands will be executed using "/usr/bin/env sh -c $COMMAND"
menu-0-0 ="  Menu | "
menu-0-0-exec = ~/.config/polybar/scripts/launcher.sh &

menu-0-1 =" Files | "
menu-0-1-exec = thunar &

menu-0-2 =" Terminal | "
menu-0-2-exec = termite &

menu-0-3 =" Browser "
menu-0-3-exec = firefox &

; Available tags:
;   <label-toggle> (default) - gets replaced with <label-(open|close)>
;   <menu> (default)
; Note that if you use <label-toggle> you must also include
; the definition for <label-open>

format = <label-toggle><menu>

label-open = 
label-open-foreground = ${color.yellow}
label-open-padding = 1
label-close =  
label-close-foreground = ${color.red}
label-close-padding = 1

; Optional item separator
; Default: none
;label-separator = " | "

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/audacious]
type = custom/script

exec = ~/.config/polybar/scripts/audacious/play_pause_s.sh

tail = true
interval = 0.3
format-background = ${color.background}
format-foreground = ${color.pink}
format-padding = 0

click-left = ~/.config/polybar/scripts/audacious/play_pause.sh
click-right = ~/.config/polybar/scripts/audacious/play_pause.sh

scroll-up = ~/.config/polybar/scripts/audacious/set_vol.sh -inc
scroll-down = ~/.config/polybar/scripts/audacious/set_vol.sh -dec

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/volume_i]
type = custom/script

exec = ~/.config/polybar/scripts/volume_i.sh 
tail = true
interval = 0.1
format-background = ${color.background}
format-foreground = ${color.blue}
format-padding = 0

click-left = pactl set-sink-mute @DEFAULT_SINK@ toggle
click-right = pactl set-sink-mute @DEFAULT_SINK@ toggle

scroll-up = ~/Scripts/volume.sh -inc
scroll-down = pactl set-sink-volume @DEFAULT_SINK@ -1%

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/pa-mic]

type = custom/script
exec = ~/.config/polybar/scripts/pa-mic.sh
tail = true
click-left = ~/.config/polybar/scripts/pa-mic.sh --toggle &
format-background = ${color.background}
format-foreground = ${color.orange}
format-padding = 0

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/i3-layout]

type = custom/script
exec = ~/.config/polybar/scripts/i3_layout.sh
tail = true
interval = 1.0
format-background = ${color.background}
format-foreground = ${color.amber}
format-padding = 0

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/brightness]

type = custom/ipc
hook-0 = ~/.config/polybar/scripts/brightness_i.sh
hook-1 = ~/.config/polybar/scripts/brightness_i.sh

initial = 1

scroll-up = ~/.config/polybar/scripts/brightness.sh -inc
scroll-down = ~/.config/polybar/scripts/brightness.sh -dec

format-background = ${color.background}
format-foreground = ${color.green}
format-padding = 0